# GoReleaser config — builds cross-platform binaries, publishes a GitHub
# release, and updates the Homebrew formula in java-rakhmonaliev/homebrew-tap.
# Docs: https://goreleaser.com
version: 2

project_name: devopsify

before:
  hooks:
    - go mod tidy

builds:
  - id: devopsify
    main: .
    binary: devopsify
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc

release:
  github:
    owner: java-rakhmonaliev
    name: devops-cli

homebrew_casks:
  - name: devopsify
    # The devops-cli repo doubles as its own Homebrew tap: GoReleaser commits
    # the generated cask to Casks/ on the default branch, using the Actions
    # GITHUB_TOKEN (no separate repo or PAT needed). To switch to a dedicated
    # java-rakhmonaliev/homebrew-tap later, change name to "homebrew-tap" and
    # token to "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}".
    repository:
      owner: java-rakhmonaliev
      name: devops-cli
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/java-rakhmonaliev/devops-cli"
    description: "One command to containerize, provision and ship any app to a VPS"
    binaries:
      - devopsify
    # The binary is unsigned; strip the quarantine flag so macOS Gatekeeper
    # doesn't block it on first run (keeps `brew install` zero-friction).
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/devopsify"]
          end
