name: release

# Tag a version (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to cut a
# release: GoReleaser builds the binaries, publishes the GitHub release, and
# commits the updated Homebrew cask to Casks/ in this repo (which doubles as
# the tap). Uses the built-in GITHUB_TOKEN — no extra secrets required.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
